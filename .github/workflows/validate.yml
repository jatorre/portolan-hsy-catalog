name: Validate catalog

# Runs on every pull request and push. Needs NO credentials (reads the repo +
# anonymous HEADs against the public bucket), so it works on fork PRs too — the
# trust gate for "anyone can PR into this catalog".

on:
  pull_request:
  push:
    branches: [main]

env:
  PUBLIC_BASE: https://8et4c.upcloudobjects.com/carto-ogc-connect-helsinki/repo/portolan-hsy-catalog

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet fastavro jsonschema
      - run: python3 tools/validate.py
