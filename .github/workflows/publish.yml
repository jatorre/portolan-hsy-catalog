name: Publish catalog to bucket

# The git repo is the SOURCE of the catalog (STAC + Iceberg table files — all
# collision-free filesystem paths). On every change, this Action generates the
# Apache Iceberg REST catalog (config / namespaces / tables) and writes it, plus
# the data files, to an object-storage bucket. The bucket's flat keyspace lets
# the same paths be both a resource and a container, so DuckDB / Snowflake can
# ATTACH the result — something a filesystem-backed host (e.g. GitHub Pages) cannot do.

on:
  push:
    branches: [main]
    paths: ['data/**', 'tools/publish.py', '.github/workflows/publish.yml']
  workflow_dispatch:

env:
  S3_ENDPOINT: https://8et4c.upcloudobjects.com
  BUCKET_PATH: carto-ogc-connect-helsinki/repo/portolan-hsy-catalog
  PUBLIC_BASE: https://8et4c.upcloudobjects.com/carto-ogc-connect-helsinki/repo/portolan-hsy-catalog

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate on credentials
        id: gate
        env:
          KEY: ${{ secrets.UPCLOUD_ACCESS_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::warning::No bucket credentials (secret UPCLOUD_ACCESS_KEY). Skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install mc
        if: steps.gate.outputs.skip != 'true'
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc

      - name: Publish to bucket
        if: steps.gate.outputs.skip != 'true'
        env:
          MC_TARGET: upcloud/${{ env.BUCKET_PATH }}
        run: |
          mc alias set upcloud "$S3_ENDPOINT" \
            "${{ secrets.UPCLOUD_ACCESS_KEY }}" "${{ secrets.UPCLOUD_SECRET_KEY }}"
          python3 tools/publish.py
